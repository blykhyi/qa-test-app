services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: qa_test
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_password
    ports:
      - "5433:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_user -d qa_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  scanner-service:
    build: ./services/scanner-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://qa_user:qa_password@postgres:5432/qa_test
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  dashboard-api:
    build: ./services/dashboard-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://qa_user:qa_password@postgres:5432/qa_test
      SCANNER_SERVICE_URL: http://scanner-service:8001
    depends_on:
      postgres:
        condition: service_healthy
      scanner-service:
        condition: service_started
    restart: on-failure

volumes:
  pgdata:
