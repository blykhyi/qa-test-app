[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short -m "not known_bug"
markers =
    api: API-level tests (Dashboard/Scanner HTTP)
    db: Tests that talk directly to Postgres
    integration: Cross-service tests (Scanner -> Dashboard)
    ui: Playwright browser tests
    smoke: Merge-blocking happy-path checks
    known_bug: Expected failures documenting known defects
